name: Validate Jekyll site

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Content and production build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tools/owner-editor-ui/package-lock.json

      - name: Install GitHub Pages Jekyll
        run: gem install github-pages --no-document

      - name: Validate Markdown and YAML content
        run: ruby scripts/validate-content.rb

      - name: Check owner editor source and front matter generation
        working-directory: tools/owner-editor-ui
        run: |
          npm ci
          npm run check
          npm test
          npm run build

      - name: Verify committed owner editor bundle
        run: git diff --exit-code -- assets/js/owner-editor.bundle.js

      - name: Build production site
        env:
          JEKYLL_ENV: production
        run: jekyll build --trace --destination _site

      - name: Check required generated pages
        shell: bash
        run: |
          required=(
            index.html
            blog/index.html
            archive/index.html
            categories/index.html
            tags/index.html
            series/index.html
            projects/index.html
            about/index.html
            contact/index.html
            search/index.html
            bookmarks/index.html
            privacy/index.html
            style-guide/index.html
            404.html
            search.json
            posts.json
            feed.xml
            sitemap.xml
            robots.txt
            manifest.webmanifest
            service-worker.js
          )
          for path in "${required[@]}"; do
            if [[ ! -f "_site/$path" ]]; then
              echo "Missing generated file: _site/$path" >&2
              exit 1
            fi
          done

      - name: Parse generated JSON and XML
        run: |
          ruby -rjson -e 'JSON.parse(File.read("_site/search.json")); JSON.parse(File.read("_site/posts.json"))'
          ruby -rrexml/document -e 'REXML::Document.new(File.read("_site/feed.xml")); REXML::Document.new(File.read("_site/sitemap.xml"))'

      - name: Check navigation current-page state
        shell: bash
        run: |
          ruby <<'RUBY'
          expected = {
            "index.html" => "Home",
            "blog/index.html" => "Blog",
            "projects/index.html" => "Projects",
            "about/index.html" => "About",
            "archive/index.html" => "Archive",
            "categories/index.html" => "Categories",
            "tags/index.html" => "Tags",
            "series/index.html" => "Series",
            "bookmarks/index.html" => "Bookmarks",
            "contact/index.html" => "Contact",
          }

          Dir.glob("_site/**/*.html").sort.each do |path|
            source = File.read(path, encoding: "UTF-8")
            navigation = source[/<nav class="desktop-nav".*?<\/nav>/m]
            raise "Missing desktop navigation in #{path}" unless navigation

            current = navigation.scan(/<a\b[^>]*aria-current="page"[^>]*>(.*?)<\/a>/m)
                                .flatten
                                .map { |label| label.gsub(/<[^>]+>/, "").strip }
            relative = path.sub(%r{\A_site/}, "")
            if expected.key?(relative)
              raise "Expected only #{expected[relative]} to be current in #{relative}; got #{current.inspect}" unless current == [expected[relative]]
            elsif current.length > 1
              raise "Multiple current navigation links in #{relative}: #{current.inspect}"
            end
          end
          RUBY

      - name: Check root-relative internal links and images
        shell: bash
        run: |
          ruby <<'RUBY'
          require "pathname"
          require "uri"

          root = Pathname.new("_site").expand_path
          broken = []

          Dir.glob(root.join("**", "*.html")).sort.each do |html_path|
            source = File.read(html_path, encoding: "UTF-8")
            source.scan(/(?:href|src)=["']([^"']+)["']/i).flatten.each do |raw_url|
              next if raw_url.empty? || raw_url.start_with?("#", "mailto:", "tel:", "data:", "javascript:")
              next if raw_url.match?(%r{\A(?:https?:)?//}i)

              clean = raw_url.split(/[?#]/, 2).first.to_s
              next if clean.empty?

              decoded = URI::DEFAULT_PARSER.unescape(clean)
              candidate = if decoded.start_with?("/")
                            root.join(decoded.sub(%r{\A/+}, ""))
                          else
                            Pathname.new(html_path).dirname.join(decoded)
                          end
              candidate = candidate.cleanpath
              next unless candidate.to_s.start_with?(root.to_s)

              exists = candidate.file?
              exists ||= candidate.directory? && candidate.join("index.html").file?
              exists ||= candidate.extname.empty? && candidate.join("index.html").file?
              broken << "#{Pathname.new(html_path).relative_path_from(root)} -> #{raw_url}" unless exists
            rescue ArgumentError
              broken << "#{Pathname.new(html_path).relative_path_from(root)} -> #{raw_url} (invalid encoding)"
            end
          end

          unless broken.empty?
            warn "Broken internal references:"
            broken.uniq.sort.each { |item| warn "  #{item}" }
            exit 1
          end

          puts "Internal reference check passed."
          RUBY
