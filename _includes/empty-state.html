<div class="empty-state" role="status">
  <div class="empty-state-mark" aria-hidden="true"></div>
  <div><h2>{{ include.title | default: '표시할 내용이 없습니다.' | escape }}</h2>{% if include.description %}<p>{{ include.description | escape }}</p>{% endif %}{% if include.link_url %}<a class="text-link" href="{{ include.link_url | relative_url }}">{{ include.link_label | default: '돌아가기' | escape }} {% include icon.html name='arrow' %}</a>{% endif %}</div>
</div>
