<dialog class="search-dialog" data-search-dialog data-search-limit="{{ site.data.site.search_results_limit | default: 8 }}" aria-labelledby="search-dialog-title">
  <div class="search-dialog-shell">
    <header class="search-dialog-header">
      <div><span class="eyebrow">Site search</span><h2 id="search-dialog-title">블로그 검색</h2></div>
      <button class="icon-button" type="button" data-search-close aria-label="검색 닫기">{% include icon.html name='close' %}</button>
    </header>
    <form class="search-form" action="{{ '/search/' | relative_url }}" method="get" role="search">
      <label for="global-search-input">검색어</label>
      <div class="search-input-wrap">{% include icon.html name='search' %}<input id="global-search-input" name="q" type="search" autocomplete="off" placeholder="제목, 태그, 본문 검색" data-search-input></div>
    </form>
    <div class="search-recent" data-recent-searches hidden>
      <div class="search-section-heading"><h3>최근 검색어</h3><button type="button" class="text-button" data-clear-recent-searches>모두 지우기</button></div>
      <ul data-recent-search-list></ul>
    </div>
    <div class="search-results" data-search-results role="listbox" aria-label="검색 결과">
      <p class="search-hint">검색어를 입력하면 사이트 안의 글과 프로젝트를 찾습니다.</p>
    </div>
    <footer class="search-dialog-footer"><span>↑↓ 이동</span><span>Enter 열기</span><span>Esc 닫기</span><a href="{{ '/search/' | relative_url }}">전체 검색 페이지</a></footer>
  </div>
</dialog>
