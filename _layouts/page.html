---
layout: default
---
<div class="container page-shell">
  <div class="{% if page.show_sidebar %}content-grid{% else %}page-single{% endif %}">
    <article class="page main-column" aria-labelledby="page-title">
      <header class="page-header">
        <h1 id="page-title">{{ page.title | escape }}</h1>
        {% if page.description and page.show_description != false %}
          <p class="page-description">{{ page.description | escape }}</p>
        {% endif %}
      </header>
      <div class="page-content{% unless page.prose == false %} prose{% endunless %}">
        {{ content }}
      </div>
    </article>
    {% if page.show_sidebar %}
      {% include sidebar.html %}
    {% endif %}
  </div>
</div>
