# 브라우저 제목과 footer에 표시합니다. 비우면 _config.yml의 title을 사용합니다.
title: "Daeho-AI"
# 홈 소개, 검색, SEO fallback에 사용합니다.
description: "기술 기록과 프로젝트를 정리하는 개인 기술 블로그"
# html lang 기본값입니다.
language: "ko"
# light, dark, system 중 하나입니다. 초기 권장값은 system입니다.
default_theme: "system"
# 브라우저 theme-color와 주요 링크 색상에 사용합니다.
accent_color: "#1d4ed8"
# Liquid date 필터 형식입니다. 예: "%Y.%m.%d"
date_format: "%Y.%m.%d"
# /blog/의 JavaScript 페이지당 글 수입니다. JS가 꺼지면 전체 글이 보입니다.
posts_per_page: 8
# 홈과 사이드바에서 표시할 추천 글 최대 개수입니다.
featured_posts_limit: 3
# 홈과 사이드바의 최근 글 최대 개수입니다.
recent_posts_limit: 6
# 게시글 하단 관련 글 최대 개수입니다.
related_posts_limit: 3
# 검색 dialog에서 한 번에 표시할 최대 결과 수입니다.
search_results_limit: 8

features:
  # 헤더 검색 dialog와 /search/ 페이지를 표시합니다.
  search: true
  # localStorage 기반 개인 북마크와 /bookmarks/를 표시합니다.
  bookmarks: true
  # localStorage 기반 최근 본 글을 최대 5개 표시합니다.
  recently_viewed: true
  # 게시글 상단 읽기 진행률을 표시합니다.
  reading_progress: true
  # h2/h3 자동 목차의 사이트 기본값입니다. 글별 toc 값이 우선합니다.
  table_of_contents: true
  # integrations.yml과 글별 comments가 모두 유효할 때만 댓글을 표시합니다.
  comments: false
  # integrations.yml의 분석 설정과 동의가 모두 유효할 때만 로드합니다.
  analytics: false
  # manifest는 항상 제공하지만 service worker 등록은 이 값이 true일 때만 합니다.
  pwa: false
  # 이전 요청의 인페이지 편집을 기본으로 사용하므로 GitHub 편집 링크는 기본 비활성입니다.
  edit_on_github: false
  # 게시글 하단 작성자 카드를 표시합니다.
  author_card: true
  # 홈과 블로그 목록의 사이드바를 표시합니다.
  sidebar: true

# edit_on_github를 켤 때 사용하는 공개 저장소 정보입니다.
repository: "Daeho-AI/Daeho-AI.github.io"
repository_branch: "main"
